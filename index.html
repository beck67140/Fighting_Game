<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: "Press Start 2P", cursive;
        }
    </style>
</head>
<body>
    <!-- red container div-->
    <div style="position: relative; display: inline-block">
        <!-- smaller red container div -->
        <div 
            style="
                position: absolute; 
                display: flex; 
                width: 100%; 
                align-items:center;
                padding: 20px;
            "
        >
            <!-- player health -->
           <div style="position: relative; width: 100%; display: flex; justify-content: flex-end; border-top: 4px solid white; border-bottom: 4px solid white; border-left: 4px solid white">
                <div 
                     
                    style="background-color: red; height: 30px; width: 100%"
                ></div>
                <div 
                id="playerHealth"
                style="position: absolute; background: #818CF8; top: 0; right: 0; bottom: 0; width: 100%"></div>
            </div>
            <!-- timer -->
            <div 
            id="timer"
                style="
                    background-color: black;
                    width: 100px; 
                    height: 50px; 
                    flex-shrink: 0;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: white;
                    border: 4px solid white
                "
            >
                1:30
            </div>
            <!-- enemy health -->
            <div style="position: relative; width: 100%; border-top: 4px solid white; border-bottom: 4px solid white; border-right: 4px solid white">
                <div 
                     
                    style="background-color: red; height: 30px"
                ></div>
                <div 
                id="enemyHealth"
                style="position: absolute; background: #818CF8; top: 0; right: 0; bottom: 0; left: 0"></div>
            </div>
            <div></div>
        </div>
        <div 
        id="displayText"
        style="position: absolute; color: white; align-items: center; justify-content: center; top: 0; right: 0; bottom: 0; left: 0; display: none;">Tie</div>

        <div id="mainMenu" style="position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.75); z-index: 10;">
            <div style="text-align:center; color: white;">
                <div style="font-size: 28px; margin-bottom: 12px;">Samurai 1v1</div>
                <div style="font-size: 14px; margin-bottom: 20px;">Press Play to start</div>
                <button id="playButton" style="padding: 10px 18px; font-size: 14px; cursor: pointer;">Play</button>
            </div>
        </div>

        <canvas></canvas>
    </div>

    <div style="margin-top: 12px; display: flex; justify-content: center; gap: 8px; align-items: center; flex-wrap: wrap;">
        <button id="cpuToggle" style="padding: 10px 14px; font-size: 12px; cursor: pointer;">CPU: Off</button>
        <button id="restartButton" style="padding: 10px 14px; font-size: 12px; cursor: pointer;">Restart</button>
        <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
            <button id="difficultyEasy" style="padding: 8px 10px; font-size: 11px; cursor: pointer;">Easy</button>
            <button id="difficultyNormal" style="padding: 8px 10px; font-size: 11px; cursor: pointer;">Normal</button>
            <button id="difficultyHard" style="padding: 8px 10px; font-size: 11px; cursor: pointer;">Hard</button>
            <button id="difficultyExtreme" style="padding: 8px 10px; font-size: 11px; cursor: pointer;">Extreme</button>
            <button id="difficultyImpossible" style="padding: 8px 10px; font-size: 11px; cursor: pointer;">Impossible</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js" integrity="sha512-H6cPm97FAsgIKmlBA4s774vqoN24V5gSQL4yBTDOY2su2DeXZVhQPxFK4P6GPdnZqM9fg1G3cMv5wD7e6cFLZQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="JS/utils.js"></script>
    <script src="JS/classes.js"></script>
    <script src="script.js"></script>
</body>
